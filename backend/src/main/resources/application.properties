quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
quarkus.datasource.jdbc.max-size=16

quarkus.index-page.enabled=false
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
quarkus.http.cors.methods=GET, PUT, POST, DELETE, OPTIONS

quarkus.keycloak.devservices.enabled=false

quarkus.flyway.migrate-at-start=true

aren.jwt.issuer=${JWT_ISSUER}
mp.jwt.verify.issuer=${aren.jwt.issuer}

quarkus.quinoa.build-dir=build
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.package-manager-install.node-version=24.6.0
quarkus.quinoa.package-manager-install.npm-version=11.5.1
quarkus.quinoa.dev-server.port=5173
quarkus.quinoa.enable-spa-routing=true
%dev.quarkus.quinoa.dev-server.index-page=/
quarkus.quinoa.ignored-path-prefixes=/api
